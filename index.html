<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gradient Cube</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        .cube {
            position: relative;
            width: 200px;
            height: 200px;
            transform-style: preserve-3d;
        }
        .face {
            position: absolute;
            width: 200px;
            height: 200px;
            opacity: 0.8;
        }
        /* 正面 */
        .front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transform: translateZ(100px);
        }
        /* 顶面 */
        .top {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            transform: translateY(-100px) rotateX(90deg) skewX(30deg) skewY(0deg);
        }
        /* 侧面 */
        .right {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            transform: translateX(100px) rotateY(90deg) skewX(0deg) skewY(30deg);
        }
    </style>
</head>
<body>
    <div class="cube">
        <div class="face front"></div>
        <div class="face top"></div>
        <div class="face right"></div>
    </div>
</body>
</html>
